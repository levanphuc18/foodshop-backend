spring.application.name=foodshop

#datasource
spring.datasource.url=${mysql_url}
spring.datasource.username=${mysql_username}
spring.datasource.password=${mysql_password}

# Hibernate JPA
#spring.jpa.hibernate.ddl-auto=update

# Use validate or none when using Flyway, update is dangerous with migrations
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT config
# jwt.secret is read via ${jwt.secret} in JwtUtil
jwt.secret=${jwt_secret}


# Example: jwt_access_expiration=36000000 (10 hours), jwt_refresh_expiration=360000000 (100 hours)
jwt_access_expiration=${jwt_access_expiration}
jwt_refresh_expiration=${jwt_refresh_expiration}
app.frontend.url=${app_frontend_url:http://localhost:3000}

# File upload size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# VNPay Setup (Sandbox)
vnpay.tmnCode=${VNPAY_TEST}
vnpay.hashSecret=${VNPAY_SECRET_KEY}
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.returnUrl=http://localhost:8080/api/v1/payment/vnpay-return
vnpay.version=2.1.0
vnpay.command=pay
