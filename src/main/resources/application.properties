spring.application.name=foodshop

#datasource
spring.datasource.url=${mysql_url}
spring.datasource.username=${mysql_username}
spring.datasource.password=${mysql_password}

# Hibernate JPA
#spring.jpa.hibernate.ddl-auto=update

# Use validate or none when using Flyway, update is dangerous with migrations
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT config
# jwt.secret is read via ${jwt.secret} in JwtUtil
jwt.secret=${jwt_secret}


# Example: jwt_access_expiration=36000000 (10 hours), jwt_refresh_expiration=360000000 (100 hours)
jwt_access_expiration=${jwt_access_expiration}
jwt_refresh_expiration=${jwt_refresh_expiration}
app.frontend.url=${app_frontend_url:http://localhost:3000}

# File upload size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# VNPay Setup (Sandbox)
vnpay.tmnCode=${VNPAY_TEST}
vnpay.hashSecret=${VNPAY_SECRET_KEY}
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.returnUrl=http://localhost:8080/api/v1/payment/vnpay-return
vnpay.version=2.1.0
vnpay.command=pay

# Mail / notification (Gmail-ready)
# To send real email:
# - set SPRING_MAIL_USERNAME to your Gmail address
# - set SPRING_MAIL_PASSWORD to your Gmail App Password
# - set APP_NOTIFICATION_EMAIL_MOCK=false
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:true}
app.notification.email.mock=${APP_NOTIFICATION_EMAIL_MOCK:false}
app.notification.email.from=${APP_NOTIFICATION_EMAIL_FROM:}

# Google OAuth2 (dummy defaults for local development)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
